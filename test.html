<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Lunar Widget</title>
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <h3>Test âm lịch</h3>
  <pre id="log"></pre>

  <script src="lunar-core.js"></script>
  <script>
    const tests = [
      ["21/04/2026", 21,4,2026, "5/3/2026"],
      ["17/02/2026", 17,2,2026, "1/1/2026"],
      ["10/02/2024", 10,2,2024, "1/1/2024"],
      ["29/09/2023", 29,9,2023, "15/8/2023"]
    ];

    let out = "";

    tests.forEach(t => {
      const r = convertSolar2Lunar(t[1],t[2],t[3],7);
      const result = `${r.day}/${r.month}/${r.year}`;
      const ok = result === t[4];

      out += `${t[0]} → ${result} | expected ${t[4]} ${ok ? "✅" : "❌"}\n`;
    });

    document.getElementById("log").innerText = out;
  </script>
</body>
</html>
